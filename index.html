<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>racing</title>

        <style>
            @font-face {
                font-family: "RaceName";
                src: local("Trebuchet MS");
            }
        </style>
        <link rel="stylesheet" type="text/css" href="./css/styles.css?v=20260621-hud">
        <link rel="icon" type="image/svg+xml" href="./assets/favicon.ico" />
    </head>
    
    <body>
        <div id="app-shell">
            <div id="curtain"></div>

            <section id="menu-view" class="app-view is-active">
                <canvas id="menu"></canvas>
            </section>

            <section id="race-view" class="app-view" aria-hidden="true">
                <canvas id="game"></canvas>
                <canvas id="race-hud"></canvas>

                <div id="marker-layer"></div>

                <div id="joystick">
                    <div id="knob"></div>
                </div>
            </section>
        </div>

        <script type="application/javascript" src="./dist/app.bundle.js?v=20260621-hud" ></script>

</html>
